name: sortia
description: Votre secrétaire administrative intelligente
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # IA / Gemini
  google_generative_ai: ^0.4.0

  # Réseau
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Sécurité & Chiffrement
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  local_auth: ^2.2.0
  crypto: ^3.0.3

  # Fichiers & Documents
  file_picker: ^8.0.3
  open_file: ^3.3.2
  path_provider: ^2.1.3
  pdf: ^3.11.0
  printing: ^5.13.1
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  image: ^4.2.0
  google_mlkit_text_recognition: ^0.13.1

  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # Mail — sera ajouté quand le module mail sera implémenté
  # enough_mail: ^2.2.0

  # Signature électronique
  http: ^1.2.1

  # Paiements
  # stripe_flutter: ^10.1.0  # TODO: Ajouter quand Stripe sera configuré

  # Monitoring & Erreurs
  sentry_flutter: ^8.3.0

  # Utilitaires
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  logger: ^2.4.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  dart_jsonwebtoken: ^2.12.2
  xml: ^6.5.0
  archive: ^3.6.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  hive_generator: ^2.0.1

  # Tests
  mockito: ^5.4.4

  # Lint
  flutter_lints: ^4.0.0
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/images/logo/
    - assets/images/illustrations/
    - assets/lottie/
  # Fonts — décommenter quand les fichiers Inter sont téléchargés
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/inter/Inter-Regular.ttf
  #       - asset: assets/fonts/inter/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/inter/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/inter/Inter-Bold.ttf
  #         weight: 700
